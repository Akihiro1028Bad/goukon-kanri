name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

# モデルエイリアス → 正式モデルID のマッピング
# コメントで --model opus / sonnet / haiku と指定可能
# 未指定時のデフォルト: claude-sonnet-4-20250514
env:
  DEFAULT_MODEL: "claude-sonnet-4-20250514"

jobs:
  # ─────────────────────────────────────────────
  # 設計フェーズ: Issue 分析 → 方針提案コメント
  # トリガー: Issue 作成時 or @claude（実装指示以外）
  # ─────────────────────────────────────────────
  design:
    if: |
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && !contains(github.event.comment.body, '@claude implement') && !contains(github.event.comment.body, '@claude 実装して'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Extract model from comment
        id: model
        run: |
          # Issue 本文またはコメントからモデル指定を抽出
          if [ "${{ github.event_name }}" = "issues" ]; then
            COMMENT_BODY="${{ github.event.issue.body }}"
          else
            COMMENT_BODY="${{ github.event.comment.body }}"
          fi

          # --model <name> パターンを抽出
          MODEL_ALIAS=$(echo "$COMMENT_BODY" | grep -oP '(?<=--model\s)\S+' || echo "")

          # エイリアスを正式モデルIDに変換
          case "$MODEL_ALIAS" in
            opus)   MODEL_ID="claude-opus-4-20250514" ;;
            sonnet) MODEL_ID="claude-sonnet-4-20250514" ;;
            haiku)  MODEL_ID="claude-haiku-4-5-20251001" ;;
            "")     MODEL_ID="${DEFAULT_MODEL}" ;;
            *)      MODEL_ID="$MODEL_ALIAS" ;;  # 正式ID直接指定も可
          esac

          echo "model_id=$MODEL_ID" >> "$GITHUB_OUTPUT"
          echo "使用モデル: $MODEL_ID"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code (設計提案)
        id: claude
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model ${{ steps.model.outputs.model_id }}
            --max-turns 50
            --allowedTools "Read,Glob,Grep,TodoWrite,Bash(git*),Bash(gh*),Bash(ls*),Bash(cat*),Bash(echo*),Bash(pwd*),Bash(which*),Bash(npm*),Bash(npx*)"
            --append-system-prompt "あなたは Issue の設計レビュアーです。以下のルールに従ってください:

            ## 対応ルール
            1. Issue の要件を分析し、コードベースを調査する
            2. 以下のフォーマットで設計提案を Issue コメントとして投稿する:
               - **📋 要件整理**: Issue の要件を箇条書きで整理
               - **📁 影響範囲**: 変更対象のファイル・コンポーネント一覧
               - **🔧 変更内容**: 具体的な修正方針（コード例含む）
               - **🧪 テスト方針**: 追加・修正するテスト（カバレッジ100%目標）
               - **⚠️ リスク**: 潜在的な問題点・副作用
               - **📊 工数見積**: 変更規模（S/M/L）
            3. この段階ではコード変更・ブランチ作成・PR作成は絶対に行わない
            4. コメントの末尾に「実装を開始するには \`@claude implement\` または \`@claude 実装して\` とコメントしてください」と案内する"

      - name: Post Failure Comment on Design Phase
        if: always() && steps.claude.outcome != 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          gh issue comment "$ISSUE_NUMBER" --body "## ⚠️ 設計提案の作成が失敗しました

          **実行結果**: \`${{ steps.claude.outcome }}\`
          **実行ログ**: [$RUN_URL]($RUN_URL)

          ### 次のステップ
          1. 上記の実行ログを確認してください
          2. Issue の内容を明確化してください
          3. \`@claude\` とメンションして再度設計提案をリクエストしてください"

  # ─────────────────────────────────────────────
  # 実装フェーズ: ブランチ作成 → 実装 → テスト → PR
  # トリガー: @claude implement / @claude 実装して
  # ─────────────────────────────────────────────
  implement:
    if: |
      github.event_name == 'issue_comment' && (contains(github.event.comment.body, '@claude implement') || contains(github.event.comment.body, '@claude 実装して'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: goukon_kanri_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/goukon_kanri_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5433/goukon_kanri_test
    steps:
      - name: Extract model from comment
        id: model
        run: |
          COMMENT_BODY="${{ github.event.comment.body }}"

          # --model <name> パターンを抽出
          MODEL_ALIAS=$(echo "$COMMENT_BODY" | grep -oP '(?<=--model\s)\S+' || echo "")

          # エイリアスを正式モデルIDに変換
          case "$MODEL_ALIAS" in
            opus)   MODEL_ID="claude-opus-4-20250514" ;;
            sonnet) MODEL_ID="claude-sonnet-4-20250514" ;;
            haiku)  MODEL_ID="claude-haiku-4-5-20251001" ;;
            "")     MODEL_ID="${DEFAULT_MODEL}" ;;
            *)      MODEL_ID="$MODEL_ALIAS" ;;
          esac

          echo "model_id=$MODEL_ID" >> "$GITHUB_OUTPUT"
          echo "使用モデル: $MODEL_ID"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Prisma
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Run Claude Code (実装)
        id: claude
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: |
            --model ${{ steps.model.outputs.model_id }}
            --max-turns 100
            --allowedTools "Read,Edit,Write,Glob,Grep,TodoWrite,Bash(git*),Bash(npm*),Bash(npx*),Bash(gh*),Bash(ls*),Bash(cat*),Bash(echo*),Bash(pwd*),Bash(which*)"
            --append-system-prompt "あなたは Issue の実装担当者です。以下のルールに従ってください:

            ## 実装ルール
            1. Issue の過去コメント（設計提案）を確認し、方針に沿って実装する
            2. ブランチ名: issue-{Issue番号}-{短い説明} （例: issue-15-fix-event-validation）
            3. TDD で進める: テスト作成 → 実装 → リファクタリング
            4. 修正したファイルのテストカバレッジは100%を目標にする
            5. テスト実行: npm run test:run で全テスト通過を確認
            6. 型チェック: npx tsc --noEmit でエラーがないことを確認
            7. Lint: npm run lint でエラーがないことを確認
            8. 全チェック通過後、PR を作成する
            9. PR の説明は日本語で記述し、Issue 番号を参照する（Closes #番号）
            10. コミットメッセージは日本語で記述する

            ## PR フォーマット
            タイトル: 簡潔な変更内容（70文字以内）
            本文:
            - ## 概要: 変更内容の説明
            - ## 対応 Issue: Closes #番号
            - ## 変更内容: 箇条書き
            - ## テスト: 追加・修正したテストの説明
            - ## 確認事項: レビュアーに確認してほしいポイント"

      - name: Check Claude Execution Status
        id: check_status
        if: always()
        run: |
          echo "Claude Code 実行結果: ${{ steps.claude.outcome }}"
          if [ "${{ steps.claude.outcome }}" != "success" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "⚠️ Claude Code の実行が失敗または完了しませんでした"
          else
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "✅ Claude Code の実行が正常に完了しました"
          fi

      - name: Debug Info on Failure
        if: always() && steps.claude.outcome != 'success'
        run: |
          echo "=== システム情報 ==="
          echo "ディスク使用状況:"
          df -h
          echo ""
          echo "メモリ使用状況:"
          free -m
          echo ""
          echo "実行中のプロセス:"
          ps aux | grep -E "(postgres|node|npm)" || true
          echo ""

          echo "=== 環境変数 ==="
          env | grep -E "(DATABASE|NODE|NPM)" || true
          echo ""

          echo "=== Git 状態 ==="
          git status || true
          git branch -a || true
          echo ""

          echo "=== 最近のログ ==="
          ls -la /tmp/*.log 2>/dev/null || echo "ログファイルなし"

          echo "=== Node.js / npm バージョン ==="
          node --version
          npm --version

          echo "=== データベース接続確認 ==="
          pg_isready -h localhost -p 5433 -U postgres || echo "PostgreSQL接続失敗"

      - name: Upload Debug Artifacts
        if: always() && steps.claude.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs-${{ github.run_id }}
          path: |
            /tmp/*.log
            ./**/*.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Post Failure Comment to Issue
        if: always() && steps.claude.outcome != 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          gh issue comment "$ISSUE_NUMBER" --body "## ⚠️ 実装作業が途中で失敗しました

          **実行結果**: \`${{ steps.claude.outcome }}\`
          **実行ログ**: [$RUN_URL]($RUN_URL)

          ### 考えられる原因
          - タイムアウト（最大ターン数: 100）
          - テスト失敗
          - 型チェックエラー
          - Lintエラー
          - データベース接続エラー
          - メモリ不足

          ### 次のステップ
          1. 上記の実行ログを確認してください
          2. 問題を特定したら、\`@claude 実装して\` で再実行してください
          3. 必要に応じて Issue の要件を明確化してください

          デバッグログは Artifacts からダウンロードできます。"

      - name: Post Success Comment to Issue
        if: always() && steps.claude.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # 作成されたPRのURLを取得（最新のPRを取得）
          PR_URL=$(gh pr list --limit 1 --json url --jq '.[0].url' || echo "")

          if [ -n "$PR_URL" ]; then
            gh issue comment "$ISSUE_NUMBER" --body "## ✅ 実装作業が完了しました

          PR が作成されました: $PR_URL

          レビューをお願いします。

          **実行ログ**: [$RUN_URL]($RUN_URL)"
          else
            gh issue comment "$ISSUE_NUMBER" --body "## ✅ 実装作業が完了しました

          実装は完了しましたが、PR URLの取得に失敗しました。
          PRリストを確認してください。

          **実行ログ**: [$RUN_URL]($RUN_URL)"
          fi

  # ─────────────────────────────────────────────
  # PR レビューコメント対応
  # トリガー: PR コメントで @claude
  # ─────────────────────────────────────────────
  pr-comment:
    if: |
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Extract model from comment
        id: model
        run: |
          if [ "${{ github.event_name }}" = "pull_request_review" ]; then
            COMMENT_BODY="${{ github.event.review.body }}"
          else
            COMMENT_BODY="${{ github.event.comment.body }}"
          fi

          # --model <name> パターンを抽出
          MODEL_ALIAS=$(echo "$COMMENT_BODY" | grep -oP '(?<=--model\s)\S+' || echo "")

          # エイリアスを正式モデルIDに変換
          case "$MODEL_ALIAS" in
            opus)   MODEL_ID="claude-opus-4-20250514" ;;
            sonnet) MODEL_ID="claude-sonnet-4-20250514" ;;
            haiku)  MODEL_ID="claude-haiku-4-5-20251001" ;;
            "")     MODEL_ID="${DEFAULT_MODEL}" ;;
            *)      MODEL_ID="$MODEL_ALIAS" ;;
          esac

          echo "model_id=$MODEL_ID" >> "$GITHUB_OUTPUT"
          echo "使用モデル: $MODEL_ID"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Prisma
        run: npx prisma generate

      - name: Run Claude Code (PR対応)
        id: claude
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: |
            --model ${{ steps.model.outputs.model_id }}
            --max-turns 30
            --allowedTools "Read,Edit,Write,Glob,Grep,TodoWrite,Bash(git*),Bash(npm*),Bash(npx*),Bash(gh*),Bash(ls*),Bash(cat*),Bash(echo*),Bash(pwd*)"
            --append-system-prompt "PR レビューコメントに対応してください。コード修正が必要な場合は修正し、テストが通ることを確認してからコミット・プッシュしてください。コミットメッセージは日本語で記述してください。"

      - name: Post Failure Comment on PR
        if: always() && steps.claude.outcome != 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          gh pr comment "$PR_NUMBER" --body "## ⚠️ PR対応が失敗しました

          **実行結果**: \`${{ steps.claude.outcome }}\`
          **実行ログ**: [$RUN_URL]($RUN_URL)

          ### 次のステップ
          1. 上記の実行ログを確認してください
          2. 手動で修正するか、\`@claude\` とメンションして再度リクエストしてください"
